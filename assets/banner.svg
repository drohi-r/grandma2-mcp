<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF2020"/>
      <stop offset="50%" stop-color="#FF4444"/>
      <stop offset="100%" stop-color="#CC0000"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF202000"/>
      <stop offset="20%" stop-color="#FF2020"/>
      <stop offset="80%" stop-color="#FF2020"/>
      <stop offset="100%" stop-color="#FF202000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)"/>

  <!-- Top accent line -->
  <rect x="150" y="40" width="600" height="1" fill="url(#accentLine)" opacity="0.4"/>

  <!-- Main title — clean flat design, no 3D shadow -->
  <text x="450" y="115" font-family="'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" text-anchor="middle" letter-spacing="12" fill="url(#textGrad)">MA2 AGENT</text>

  <!-- Bottom accent line -->
  <rect x="150" y="135" width="600" height="1" fill="url(#accentLine)" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="450" y="165" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="300" text-anchor="middle" letter-spacing="4" fill="#666666">GRANDMA2 CONSOLE AGENT  &#183;  210 MCP TOOLS  &#183;  AI-NATIVE</text>
</svg>
