  <g opacity="0.96">
    <path d="M1122 98H1468V422H1122V98Z" fill="#0B0B0B" stroke="#2A2A2A" stroke-width="2"/>
    <path d="M1148 124H1442V396H1148V124Z" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <path d="M1180 156H1410V364H1180V156Z" fill="#101010"/>
    <path d="M1180 156H1296L1410 270V364H1180V156Z" fill="url(#accent)" opacity="0.95"/>
    <path d="M1180 364L1410 156" stroke="#F4EDE8" stroke-width="3" opacity="0.9"/>
    <path d="M1180 260H1410" stroke="#F4EDE8" stroke-width="3" opacity="0.9"/>
