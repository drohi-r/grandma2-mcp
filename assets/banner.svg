<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MA2 Agent banner</title>
  <desc id="desc">Dark production-style banner with red black white accents and bold MA2 Agent lettering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.55" stop-color="#0D0D0D"/>
      <stop offset="1" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="accent" x1="1040" y1="90" x2="1520" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF2A2A"/>
      <stop offset="0.55" stop-color="#D4141E"/>
      <stop offset="1" stop-color="#7D0E15"/>
    </linearGradient>
    <linearGradient id="lineAccent" x1="260" y1="0" x2="1120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF2A2A"/>
      <stop offset="1" stop-color="#B5121B"/>
    </linearGradient>
    <filter id="glow" x="980" y="40" width="620" height="440" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1600" height="520" fill="url(#bg)"/>

  <g opacity="0.12" stroke="#FFFFFF">
    <path d="M0 96H1600"/>
    <path d="M0 160H1600"/>
    <path d="M0 224H1600"/>
    <path d="M0 288H1600"/>
    <path d="M0 352H1600"/>
    <path d="M0 416H1600"/>
    <path d="M160 0V520"/>
    <path d="M320 0V520"/>
    <path d="M480 0V520"/>
    <path d="M640 0V520"/>
    <path d="M800 0V520"/>
    <path d="M960 0V520"/>
    <path d="M1120 0V520"/>
    <path d="M1280 0V520"/>
    <path d="M1440 0V520"/>
  </g>

  <g opacity="0.16">
    <path d="M0 462L352 110" stroke="#FFFFFF" stroke-width="1.5"/>
    <path d="M132 520L612 40" stroke="#FFFFFF" stroke-width="1.5"/>
    <path d="M1048 520L1556 12" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>

  <rect x="78" y="76" width="112" height="7" rx="3.5" fill="url(#lineAccent)"/>
  <rect x="78" y="437" width="332" height="7" rx="3.5" fill="url(#lineAccent)"/>

  <g opacity="0.12" filter="url(#glow)">
