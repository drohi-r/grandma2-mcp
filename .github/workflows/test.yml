name: Tests

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint with Ruff
        run: uv run ruff check src/ tests/ rag/

      - name: Type check
        run: uv run mypy src/ rag/

      - name: Run tests
        run: uv run python -m pytest tests/ -v --tb=short -m "not live"
